<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive vectorial Taipei MRT Metro Map — zoom, pan, search stations, route planning and dynamic line highlighting.">
  <title>Taipei Metro 台北捷運 — Interactive Map</title>
  <link rel="stylesheet" href="style.css">
  <script>
    if (window.location.search.includes('hideSidebar=true')) {
      document.documentElement.classList.add('hide-sidebar');
    }
  </script>
</head>
<body>
<div id="app">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside id="sidebar">

    <header id="sidebar-header">
      <div class="hd-logo">TRTC · 台北大眾捷運</div>
      <div class="hd-title">
        Taipei Metro
        <span class="zh">台北捷運路線圖</span>
      </div>
      <div class="hd-sub">Interactive MRT Map · 互動地圖</div>
    </header>

    <!-- Search -->
    <section id="search-section">
      <label class="section-label" for="search-input">Search Station · 搜尋站名</label>
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Station name · 站名…" autocomplete="off" spellcheck="false">
        <span id="search-ico">⌕</span>
      </div>
      <div id="search-results"></div>
    </section>

    <!-- Route Planner -->
    <section id="routing-section">
      <label class="section-label">Route Planner · 路線規劃</label>
      <button id="route-from" class="route-display" onclick="activateRouteSelect('from')">— Select start · 出發站 —</button>
      <button id="route-to"   class="route-display" onclick="activateRouteSelect('to')">— Select end · 目的站 —</button>
      <button id="route-btn"  onclick="calculateRoute()" disabled>Find Route ↗</button>
      <button id="route-clear" onclick="clearRoute()">✕ Clear Route</button>
      <div id="route-result"></div>
    </section>

    <!-- Legend -->
    <section id="legend-section">
      <label class="section-label">Lines · 線路</label>
      <div id="legend-items"></div>
    <!-- Actions -->
    <section id="actions-section" style="padding: 12px 16px; border-top: 1px solid var(--glass-border); flex-shrink: 0;">
      <div class="action-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-size:11.5px; color:var(--text-primary)">Original Map · 原地圖</span>
        <button id="toggle-bg-btn" onclick="toggleBgImage()">Show</button>
      </div>
      <div id="bg-opacity-wrap" style="display:none; align-items:center; gap:8px; margin-bottom:12px;">
        <span style="font-size:10px; color:var(--text-secondary); width:50px;">Opacity</span>
        <input id="bg-opacity-range" type="range" min="0" max="100" value="50" style="flex:1;" oninput="adjustBgOpacity(this.value)">
        <span id="bg-opacity-val" style="font-size:10px; color:var(--text-secondary); width:25px; text-align:right;">50%</span>
      </div>
      <div style="display:flex; gap:6px; margin-bottom:6px;">
        <button id="export-svg-btn" onclick="downloadSVG()" style="flex:1; padding:7px; font-size:11px;">Download SVG</button>
        <button id="export-json-btn" onclick="exportStationsJSON()" style="flex:1; padding:7px; font-size:11px;">Export JSON</button>
      </div>
      <button id="reset-coords-btn" onclick="resetCoordinates()">Reset Coordinates</button>
    </section>

  </aside>

  <!-- ═══════════ MAP ═══════════ -->
  <main id="map-container">
    <div id="map-controls">
      <button class="mc-btn" onclick="zoomIn()"    title="Zoom In">+</button>
      <button class="mc-btn" onclick="zoomOut()"   title="Zoom Out">−</button>
      <button class="mc-btn" onclick="resetView()" title="Reset" style="font-size:13px">⌂</button>
    </div>
  </main>

</div>

<!-- Station Info Panel (floating) -->
<div id="info-panel">
  <button id="info-close" onclick="closeInfo()">✕</button>
  <div id="info-content"></div>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- D3.js v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<!-- Application -->
<script src="app.js"></script>
</body>
</html>
